name: Monorepo CI Pipeline

on:
  push:
    branches:
      - main
      - develop
      - frontend
      - backend
  pull_request:
    branches:
      - main
      - develop
      - frontend
      - backend

jobs:
  backend-ci:
    name: Backend CI (FastAPI)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install black

      - name: Check code formatting (Black)
        run: |
          black --check backend/

      - name: Verify imports and syntax
        run: |
          cd backend/
          python -m py_compile main.py auth.py crud.py database.py models.py schemas.py seed.py

  frontend-ci:
    name: Frontend CI (Next.js)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend/
          npm ci

      - name: Run Linter
        run: |
          cd frontend/
          npm run lint

      - name: Run Next.js Build
        run: |
          cd frontend/
          npm run build
        env:
          NEXT_PUBLIC_API_URL: "https://mock-api.com"
